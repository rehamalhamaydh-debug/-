<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محرابُ الحروف</title>
  <style>
    :root { --gold: #d4af37; --black: #0a0a0a; --gray: #1a1a1a; --text: #f0f0f0; --accent: #2a2a2a; }
    body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--black); color: var(--text); overflow-x: hidden; }
    
    header { background: linear-gradient(to bottom, #111, #000); text-align: center; padding: 40px 20px; border-bottom: 2px solid var(--gold); position: relative; }
    .logo { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--gold); background: #fff; margin: auto; display: block; object-fit: contain; }
    h1 { color: var(--gold); margin: 15px 0; font-size: 35px; }

    .container { max-width: 900px; margin: auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
    .card { background: var(--gray); padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; cursor: pointer; transition: 0.3s; }
    .card:hover { border-color: var(--gold); transform: translateY(-5px); background: #222; }
    .card i { font-size: 40px; display: block; margin-bottom: 15px; }
    .card h3 { color: var(--gold); margin: 0; }

    .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--black); z-index: 2000; overflow-y: auto; padding: 40px 20px; box-sizing: border-box; }
    .back-btn { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 30px; }
    
    .content-display { margin-top: 20px; }
    .post-card { background: var(--gray); padding: 20px; border-radius: 10px; border-right: 4px solid var(--gold); margin-bottom: 20px; position: relative; }
    .post-text { font-size: 1.1rem; line-height: 1.6; margin-bottom: 15px; white-space: pre-wrap; }
    
    .post-actions { border-top: 1px solid #333; padding-top: 10px; display: flex; gap: 15px; align-items: center; }
    .action-btn { background: none; border: none; color: var(--gold); cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
    .action-btn:hover { text-decoration: underline; opacity: 0.8; }
    .delete-btn { color: #ff4d4d; margin-right: auto; }

    .comment-section { margin-top: 15px; background: #222; padding: 10px; border-radius: 5px; }
    .comment-input-area { display: flex; gap: 10px; margin-top: 10px; }
    .comment-input { flex-grow: 1; background: #333; border: 1px solid #444; color: white; padding: 5px 10px; border-radius: 4px; }
    .comment-list { list-style: none; padding: 0; margin: 10px 0; font-size: 0.85rem; color: #ccc; }
    .comment-item { border-bottom: 1px solid #333; padding: 5px 0; }

    #adminPanel { display: none; background: #222; padding: 20px; border-radius: 10px; border: 1px dashed var(--gold); margin-bottom: 30px; }
    textarea { width: 100%; background: #333; color: white; border: 1px solid #444; padding: 15px; border-radius: 8px; margin-top: 10px; box-sizing: border-box; font-family: inherit; }
    .publish-btn { background: var(--gold); color: black; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }

    .team-footer { text-align: center; margin-top: 50px; padding: 30px; border-top: 1px solid #333; color: var(--gold); }
    footer { text-align: center; padding: 20px; font-size: 12px; opacity: 0.5; }
    .no-post { color: #666; font-style: italic; text-align: center; margin-top: 50px; }
  </style>
</head>
<body>

<header>
  <img class="logo" src="images (1).jpg" alt="شعار محراب الحروف">
  <h1>محرابُ الحروف</h1>
  <button onclick="loginAsRetaj()" style="background:none; border:none; color:#333; cursor:pointer; font-size:10px;">[دخول الإدارة]</button>
</header>

<div class="container">
  <div class="grid">
    <div class="card" onclick="openPage('magazine', '📖 مجلة محراب الحروف')">
      <i>📖</i>
      <h3>مجلة محراب الحروف</h3>
    </div>
    <div class="card" onclick="openPage('texts', '✍️ النصوص المميزة')">
      <i>✍️</i>
      <h3>النصوص المميزة</h3>
    </div>
    <div class="card" onclick="openPage('books', '📚 الكتب المشتركة')">
      <i>📚</i>
      <h3>الكتب المشتركة</h3>
    </div>
    <div class="card" onclick="openPage('friends', '🌟 حروف كُتبت')">
      <i>🌟</i>
      <h3>حروف كُتبت</h3>
    </div>
  </div>

  <!-- التذييل الجديد المحدث -->
  <div class="team-footer">
    <div style="font-weight: bold; margin-bottom: 10px; font-size: 20px; letter-spacing: 1px;">إدارة الفريق</div>
    <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; opacity: 0.9;">
      <span>أ. ريتاج الحمايدة</span>
      <span style="color: #444;">|</span>
      <span>أ. حماده الحصني</span>
    </div>
  </div>
</div>

<div id="pageView" class="page">
  <div class="container">
    <button class="back-btn" onclick="closePage()">← العودة للرئيسية</button>
    <h2 id="pageTitle" style="color: var(--gold);"></h2>
    
    <div id="adminPanel">
      <h4 id="panelDesc" style="margin:0;"></h4>
      <textarea id="adminInput" rows="4" placeholder="اكتب إبداعك هنا..."></textarea>
      <button class="publish-btn" onclick="savePost()">انشر الآن</button>
    </div>

    <div class="content-display" id="pageContent"></div>
  </div>
</div>

<footer>جميع الحقوق محفوظة © محرابُ الحروف</footer>

<script>
  let activePage = "";
  let isRetaj = false;
  let database = { magazine: [], texts: [], books: [], friends: [] };

  function loginAsRetaj() {
    const email = prompt("يرجى إدخال البريد الإلكتروني للمسؤول:");
    if (email === "retajalhamaydeh876@gmail.com") {
      isRetaj = true;
      alert("أهلاً بكِ ريتاج. لديكِ الآن كامل الصلاحيات.");
      if(activePage) openPage(activePage, document.getElementById('pageTitle').innerText);
    } else {
      alert("عذراً، هذا الحساب لا يملك صلاحية الإدارة.");
    }
  }

  function openPage(id, title) {
    activePage = id;
    document.getElementById('pageTitle').innerText = title;
    document.getElementById('pageView').style.display = 'block';
    
    const panel = document.getElementById('adminPanel');
    const desc = document.getElementById('panelDesc');

    if (id === 'friends' || isRetaj) {
      panel.style.display = 'block';
      desc.innerText = id === 'friends' ? "مساحة حرة - شاركنا حروفك" : "لوحة الإدارة";
    } else {
      panel.style.display = 'none';
    }

    renderContent();
  }

  function closePage() {
    document.getElementById('pageView').style.display = 'none';
  }

  function savePost() {
    const text = document.getElementById('adminInput').value;
    if (!text.trim()) return;

    const newPost = {
      id: Date.now(),
      content: text,
      likes: 0,
      comments: []
    };

    database[activePage].unshift(newPost);
    document.getElementById('adminInput').value = "";
    renderContent();
  }

  function deletePost(id) {
    if(confirm("هل أنت متأكد من حذف هذا المنشور؟")) {
      database[activePage] = database[activePage].filter(p => p.id !== id);
      renderContent();
    }
  }

  function editPost(id) {
    const post = database[activePage].find(p => p.id === id);
    const newText = prompt("تعديل النص:", post.content);
    if (newText !== null && newText.trim() !== "") {
      post.content = newText;
      renderContent();
    }
  }

  function likePost(id) {
    const post = database[activePage].find(p => p.id === id);
    post.likes++;
    renderContent();
  }

  function addComment(id) {
    const input = document.getElementById(`comm-input-${id}`);
    if (!input.value.trim()) return;
    const post = database[activePage].find(p => p.id === id);
    post.comments.push(input.value);
    input.value = "";
    renderContent();
  }

  function renderContent() {
    const display = document.getElementById('pageContent');
    const posts = database[activePage];
    
    if (posts.length === 0) {
      display.innerHTML = '<div class="no-post">لم يتم النشر بعد في هذا القسم</div>';
      return;
    }

    display.innerHTML = posts.map(p => `
      <div class="post-card">
        <div class="post-text">${p.content}</div>
        
        <div class="post-actions">
          <button class="action-btn" onclick="likePost(${p.id})">❤️ ${p.likes}</button>
          <button class="action-btn" onclick="document.getElementById('comm-area-${p.id}').style.display='block'">💬 تعليق (${p.comments.length})</button>
          
          ${(activePage === 'friends' || isRetaj) ? `
            <button class="action-btn" onclick="editPost(${p.id})">✏️ تعديل</button>
            <button class="action-btn delete-btn" onclick="deletePost(${p.id})">🗑️ حذف</button>
          ` : ''}
        </div>

        <div id="comm-area-${p.id}" class="comment-section" style="display: ${p.comments.length > 0 ? 'block' : 'none'}">
          <ul class="comment-list">
            ${p.comments.map(c => `<li class="comment-item">${c}</li>`).join('')}
          </ul>
          <div class="comment-input-area">
            <input type="text" id="comm-input-${p.id}" class="comment-input" placeholder="اكتب تعليقاً...">
            <button class="action-btn" onclick="addComment(${p.id})">إرسال</button>
          </div>
        </div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
